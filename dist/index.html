<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Toxin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- CSS will be imported via Vite in main.js -->
  <script type="module" crossorigin src="/abyssal-toxin/assets/index-CaCukALt.js"></script>
  <link rel="stylesheet" crossorigin href="/abyssal-toxin/assets/index-cgC2-DFH.css">
</head>
<body>
    <div id="game-container">
        <div id="story-log" class="glass-panel">
            <!-- Story text will be injected here -->
        </div>
        
        <div id="choices-container">
            <!-- Choices will be injected here -->
        </div>
    </div>

    <div id="hud">
        <div id="chapter-title" class="chapter-title-hud"></div>
        <div class="hud-buttons" style="display: flex; gap: 12px; margin-top: 10px;">
            <button id="history-btn" class="glass-btn">
                <span class="icon">📜</span> History
            </button>
            <button id="notebook-btn" class="glass-btn pulse-glow">
                <span class="icon">🔍</span> Notebook
            </button>
        </div>
    </div>

    <!-- Detective Notebook Modal -->
    <div id="notebook-modal" class="modal-overlay hidden">
        <div class="notebook-content glass-panel">
            <div class="notebook-header">
                <h2>Detective Notebook</h2>
                <button id="close-notebook-btn" class="close-btn">&times;</button>
            </div>
            
            <div class="notebook-tabs">
                <button class="tab-btn active" data-target="suspects-tab">Suspects</button>
                <button class="tab-btn" data-target="clues-tab">Clues</button>
            </div>
            
            <div class="tab-content">
                <div id="suspects-tab" class="tab-pane active">
                    <!-- Suspects content here -->
                </div>
                <div id="clues-tab" class="tab-pane">
                    <!-- Clues content here -->
                </div>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal-overlay hidden">
        <div class="notebook-content glass-panel" style="max-width: 700px;">
            <div class="notebook-header">
                <h2>Transcript Log</h2>
                <button id="close-history-btn" class="close-btn">&times;</button>
            </div>
            <div class="tab-content" id="history-log" style="display: flex; flex-direction: column; gap: 16px; padding: 12px;">
                <!-- History items injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
</body>
</html>
