<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Abyssal Toxin — An interactive deep-sea thriller. Your choices shape the story.">
    <title>The Abyssal Toxin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="vignette"></div>
    <div class="particles" id="particles"></div>

    <div class="title-screen" id="titleScreen">
        <div class="title-content">
            <p class="title-sub">An Interactive Novel</p>
            <h1 class="title-main">The Abyssal<br>Toxin</h1>
            <div class="title-divider"></div>
            <p class="title-tagline">Thirty-six thousand feet below the surface.<br>No one can hear you choose.</p>
            <button class="start-btn" id="startBtn">
                <span>Begin Descent</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
            </button>
        </div>
        <div class="depth-indicator">
            <span class="depth-label">DEPTH</span>
            <span class="depth-value">36,000 ft</span>
        </div>
    </div>

    <main class="game-container" id="gameContainer">
        <div class="story-log" id="storyLog"></div>
    </main>

    <div class="restart-bar" id="restartBar">
        <button class="restart-btn" id="restartBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            <span>Start Over</span>
        </button>
    </div>

    <script src="story.js"></script>
    <script src="app.js"></script>
</body>
</html>
